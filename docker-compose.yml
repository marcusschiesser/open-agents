services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: open_agents
      POSTGRES_USER: open_agents
      POSTGRES_PASSWORD: open_agents
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_agents -d open_agents"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  daytona-db:
    image: postgres:18
    environment:
      POSTGRES_DB: daytona
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d daytona"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - daytona-db-data:/var/lib/postgresql/18/docker

  daytona-redis:
    image: redis:latest

  daytona-registry:
    image: registry:2.8.2
    environment:
      REGISTRY_HTTP_ADDR: 0.0.0.0:6000
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin: "[http://registry-ui.example.com]"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods: "[HEAD,GET,OPTIONS,DELETE]"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Credentials: "[true]"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers: "[Authorization,Accept,Cache-Control]"
      REGISTRY_HTTP_HEADERS_Access-Control-Expose-Headers: "[Docker-Content-Digest]"
    networks:
      default:
        aliases:
          - registry
    volumes:
      - daytona-registry-data:/var/lib/registry

  daytona-minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_IDENTITY_STS_EXPIRY: 24h
    volumes:
      - daytona-minio-data:/data

  daytona-dex:
    image: dexidp/dex:v2.42.0
    entrypoint:
      ["sh", "-c", "touch /var/dex/dex.db && exec dex serve /etc/dex/config.yaml"]
    volumes:
      - ./docker/daytona/dex-config.yaml:/etc/dex/config.yaml:ro
      - daytona-dex-data:/var/dex
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:5556/dex/.well-known/openid-configuration"]
      interval: 5s
      timeout: 5s
      retries: 20

  daytona-runner:
    image: daytonaio/daytona-runner
    privileged: true
    entrypoint:
      [
        "sh",
        "-c",
        "printf '{\"insecure-registries\":[\"registry:6000\",\"daytona-registry:6000\"]}\n' >/etc/docker/daemon.json && exec /bin/sh -c '/usr/local/bin/dockerd-entrypoint.sh & daytona-runner'",
      ]
    depends_on:
      daytona-db:
        condition: service_healthy
      daytona-dex:
        condition: service_healthy
      daytona-minio:
        condition: service_started
      daytona-redis:
        condition: service_started
      daytona-registry:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3003/"]
      interval: 10s
      timeout: 5s
      retries: 20
    environment:
      ENVIRONMENT: development
      API_PORT: 3003
      DAYTONA_RUNNER_TOKEN: secret_api_token
      LOG_FILE_PATH: /home/daytona/runner/runner.log
      RESOURCE_LIMITS_DISABLED: "true"
      AWS_ENDPOINT_URL: http://daytona-minio:9000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_BUCKET: daytona
      DAYTONA_API_URL: http://daytona-api:3000/api
      RUNNER_DOMAIN: daytona-runner
      SSH_GATEWAY_ENABLE: "true"
      SSH_PUBLIC_KEY: 
      INTER_SANDBOX_NETWORK_ENABLED: "false"

  daytona-ssh-gateway:
    image: daytonaio/daytona-ssh-gateway
    environment:
      API_URL: http://daytona-api:3000/api
      API_KEY: ssh_secret_api_token
      SSH_PRIVATE_KEY: 
      SSH_HOST_KEY: 
      SSH_GATEWAY_PORT: 2222

  daytona-api:
    image: daytonaio/daytona-api
    privileged: true
    depends_on:
      daytona-db:
        condition: service_healthy
      daytona-runner:
        condition: service_healthy
      daytona-redis:
        condition: service_started
      daytona-dex:
        condition: service_healthy
      daytona-registry:
        condition: service_started
      daytona-minio:
        condition: service_started
    restart: on-failure
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    environment:
      OTEL_ENABLED: "false"
      DEFAULT_SNAPSHOT: daytonaio/sandbox:0.5.0-slim
      ENCRYPTION_KEY: supersecretkey
      ENCRYPTION_SALT: supersecretsalt
      NODE_ENV: production
      PORT: 3000
      DB_HOST: daytona-db
      DB_PORT: 5432
      DB_USERNAME: user
      DB_PASSWORD: pass
      DB_DATABASE: daytona
      REDIS_HOST: daytona-redis
      REDIS_PORT: 6379
      OIDC_CLIENT_ID: daytona
      OIDC_ISSUER_BASE_URL: http://daytona-dex:5556/dex
      PUBLIC_OIDC_DOMAIN: http://localhost:5556/dex
      OIDC_AUDIENCE: daytona
      DASHBOARD_URL: http://localhost:3001/dashboard
      DASHBOARD_BASE_API_URL: http://localhost:3001
      POSTHOG_API_KEY: ""
      POSTHOG_HOST: ""
      POSTHOG_ENVIRONMENT: local
      TRANSIENT_REGISTRY_URL: http://registry:6000
      TRANSIENT_REGISTRY_ADMIN: admin
      TRANSIENT_REGISTRY_PASSWORD: password
      TRANSIENT_REGISTRY_PROJECT_ID: daytona
      INTERNAL_REGISTRY_URL: http://registry:6000
      INTERNAL_REGISTRY_ADMIN: admin
      INTERNAL_REGISTRY_PASSWORD: password
      INTERNAL_REGISTRY_PROJECT_ID: daytona
      SMTP_HOST: ""
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_SECURE: ""
      SMTP_EMAIL_FROM: Daytona Team <no-reply@daytona.io>
      S3_ENDPOINT: http://daytona-minio:9000
      S3_STS_ENDPOINT: http://daytona-minio:9000/minio/v1/assume-role
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_DEFAULT_BUCKET: daytona
      S3_ACCOUNT_ID: /
      S3_ROLE_NAME: /
      ENVIRONMENT: docker-compose
      MAX_AUTO_ARCHIVE_INTERVAL: 43200
      MAINTENANCE_MODE: "false"
      PROXY_DOMAIN: proxy.localhost:4000
      PROXY_PROTOCOL: http
      PROXY_API_KEY: super_secret_key
      PROXY_TEMPLATE_URL: http://{{PORT}}-{{sandboxId}}.proxy.localhost:4000
      DEFAULT_RUNNER_DOMAIN: daytona-runner:3003
      DEFAULT_RUNNER_API_URL: http://daytona-runner:3003
      DEFAULT_RUNNER_PROXY_URL: http://daytona-runner:3003
      DEFAULT_RUNNER_API_KEY: secret_api_token
      DEFAULT_RUNNER_CPU: "4"
      DEFAULT_RUNNER_MEMORY: "8"
      DEFAULT_RUNNER_DISK: "50"
      DEFAULT_RUNNER_NAME: default
      DEFAULT_REGION_ID: us
      DEFAULT_REGION_NAME: us
      DEFAULT_REGION_ENFORCE_QUOTAS: "false"
      DEFAULT_ORG_QUOTA_TOTAL_CPU_QUOTA: "10000"
      DEFAULT_ORG_QUOTA_TOTAL_MEMORY_QUOTA: "10000"
      DEFAULT_ORG_QUOTA_TOTAL_DISK_QUOTA: "100000"
      DEFAULT_ORG_QUOTA_MAX_CPU_PER_SANDBOX: "100"
      DEFAULT_ORG_QUOTA_MAX_MEMORY_PER_SANDBOX: "100"
      DEFAULT_ORG_QUOTA_MAX_DISK_PER_SANDBOX: "1000"
      DEFAULT_ORG_QUOTA_SNAPSHOT_QUOTA: "1000"
      DEFAULT_ORG_QUOTA_MAX_SNAPSHOT_SIZE: "1000"
      DEFAULT_ORG_QUOTA_VOLUME_QUOTA: "10000"
      SSH_GATEWAY_API_KEY: ssh_secret_api_token
      SSH_GATEWAY_COMMAND: ssh -p 2222 {{TOKEN}}@localhost
      SSH_GATEWAY_PUBLIC_KEY: 
      SSH_GATEWAY_URL: localhost:2222
      RUNNER_DECLARATIVE_BUILD_SCORE_THRESHOLD: "10"
      RUNNER_AVAILABILITY_SCORE_THRESHOLD: "10"
      RUNNER_START_SCORE_THRESHOLD: "3"
      SKIP_USER_EMAIL_VERIFICATION: "true"
      RUN_MIGRATIONS: "true"
      HEALTH_CHECK_API_KEY: supersecretkey

  daytona-proxy:
    image: daytonaio/daytona-proxy
    depends_on:
      daytona-api:
        condition: service_healthy
      daytona-redis:
        condition: service_started
      daytona-dex:
        condition: service_healthy
    environment:
      DAYTONA_API_URL: http://daytona-api:3000/api
      PROXY_PORT: 4000
      PROXY_API_KEY: super_secret_key
      PROXY_PROTOCOL: http
      OIDC_CLIENT_ID: daytona
      OIDC_CLIENT_SECRET: ""
      OIDC_DOMAIN: http://daytona-dex:5556/dex
      OIDC_PUBLIC_DOMAIN: http://localhost:5556/dex
      OIDC_AUDIENCE: daytona
      REDIS_HOST: daytona-redis
      REDIS_PORT: 6379
      TOOLBOX_ONLY_MODE: "false"
      PREVIEW_WARNING_ENABLED: "false"
    networks:
      default:
        aliases:
          - proxy.localhost
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
      daytona-dex:
        condition: service_healthy
      daytona-api:
        condition: service_healthy
      daytona-proxy:
        condition: service_started
    environment:
      POSTGRES_URL: postgres://open_agents:open_agents@postgres:5432/open_agents
      JWE_SECRET: 0123456789abcdefghijklmnopqrstuv
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      DAYTONA_API_URL: http://daytona-api:3000/api
      DAYTONA_TARGET: us
      DAYTONA_BOOTSTRAP_API_KEY: "true"
      DAYTONA_BOOTSTRAP_API_KEY_NAME: open-harness-local-dev
      DAYTONA_BOOTSTRAP_API_KEY_VALUE: daytona-local-open-harness-key
      DAYTONA_DB_HOST: daytona-db
      DAYTONA_DB_PORT: "5432"
      DAYTONA_DB_NAME: daytona
      DAYTONA_DB_USER: user
      DAYTONA_DB_PASSWORD: pass
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - .:/app
      - bun-install-cache:/root/.bun/install/cache
      - root-node-modules:/app/node_modules
      - web-node-modules:/app/apps/web/node_modules

volumes:
  postgres-data:
  bun-install-cache:
  root-node-modules:
  web-node-modules:
  daytona-db-data:
  daytona-registry-data:
  daytona-minio-data:
  daytona-dex-data:
